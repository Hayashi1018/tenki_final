<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気予報（複数地点対応）</title>
  <link rel="stylesheet" href="tenki_final.css">
  <script src="tenki_final.js" defer></script>
</head>
<body id="body">
  <h1 id="city-name">天気予報</h1>
  <div id="time">----年--月--日 --:--:--</div>

  <div id="location-panel">
    <h2>📍 地点</h2>
    <ul id="location-list"></ul>

    <div id="add-form">
      <input type="text" name="name" placeholder="地名（例: 大阪）">
      <input type="number" name="lat" placeholder="緯度（例: 34.6937）" step="0.0001">
      <input type="number" name="lng" placeholder="経度（例: 135.5023）" step="0.0001">
      <button onclick="handleAdd()">＋ 追加</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th></th>
        <th id="day0">--月--日</th>
        <th id="day1">--月--日</th>
        <th id="day2">--月--日</th>
      </tr>
    </thead>
    <tbody>
      <tr><th>天気</th><td id="weathercode0">--</td><td id="weathercode1">--</td><td id="weathercode2">--</td></tr>
      <tr><th>最高気温</th><td id="temperature_2m_max0">--°C</td><td id="temperature_2m_max1">--°C</td><td id="temperature_2m_max2">--°C</td></tr>
      <tr><th>最低気温</th><td id="temperature_2m_min0">--°C</td><td id="temperature_2m_min1">--°C</td><td id="temperature_2m_min2">--°C</td></tr>
      <tr><th>降水量</th><td id="precipitation_sum0">--mm</td><td id="precipitation_sum1">--mm</td><td id="precipitation_sum2">--mm</td></tr>
      <tr><th>降水確率</th><td id="precipitation_probability_max0">--%</td><td id="precipitation_probability_max1">--%</td><td id="precipitation_probability_max2">--%</td></tr>
      <tr><th>最大風速</th><td id="wind_speed_10m_max0">--m/s</td><td id="wind_speed_10m_max1">--m/s</td><td id="wind_speed_10m_max2">--m/s</td></tr>
    </tbody>
  </table>

  <div id="credit">
    <a href="https://open-meteo.com/">Weather data by Open-Meteo.com</a>
  </div>
</body>
</html>
